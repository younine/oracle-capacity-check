name: OCI Instance Creator

：:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 인스턴스 생성 시도
        env:
          OCI_USER_OCID:           ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID:        ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT:         ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION:              ${{ secrets.OCI_REGION }}
          OCI_PRIVATE_KEY:         ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_COMPARTMENT_ID:      ${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_SUBNET_ID:           ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID:            ${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY:      ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
        run: python create_instance.py
